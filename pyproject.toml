[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["node_modules", "alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501", "E402", "E722", "B904", "F811"]

[tool.pytest.ini_options]
addopts = "-v --maxfail=1 --cov=. --cov-report=term-missing"
testpaths = ["tests"]
