name: Bot CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "dev/**"
      - "cursor/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.INNERSYNC_TOKEN }}


      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install diff-cover

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (pyright, advisory)
        continue-on-error: true
        run: npx pyright

      - name: Run tests (baseline gate)
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=24
        env:
          PYTHONPATH: .

      - name: Enforce diff coverage (no regression on changed lines)
        run: |
          git fetch origin main
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=45
