name: Bot CI

on:
  push:
    branches: 
      - main
      - 'feature/**'
      - 'dev/**'
      - 'cursor/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.INNERSYNC_TOKEN }}


      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (pyright, advisory)
        continue-on-error: true
        run: npx pyright

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=35
        env:
          PYTHONPATH: .
