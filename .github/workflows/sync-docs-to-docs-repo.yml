name: Sync Alphapy docs to docs repo

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Alphapy repo
        uses: actions/checkout@v4

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: Innersync-tech/docs
          token: ${{ secrets.DOCS_SYNC_TOKEN }}
          path: docs-repo

      - name: Validate docs repo token
        run: |
          if [ -z "${{ secrets.DOCS_SYNC_TOKEN }}" ]; then
            echo "Missing required secret: DOCS_SYNC_TOKEN"
            echo "Create a token with write access to Innersync-tech/docs (and enable org SSO if required)."
            exit 1
          fi

      - name: Sync docs folder to docs-repo/alphapy
        run: |
          rsync -av --delete docs/ docs-repo/alphapy/

      - name: Commit and push when changed
        working-directory: docs-repo
        run: |
          if git diff --quiet -- alphapy; then
            echo "No docs changes to sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add alphapy
          git commit -m "sync: update Alphapy docs from bot repository"
          git push
